AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Tweeter Server API

Globals:
  Api:
    Cors:
      AllowMethods: "'OPTIONS,POST,GET,PUT,DELETE,PATCH'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Timeout: 10
    MemorySize: 256
    CodeUri: ./dist
    Environment:
      Variables:
        USE_FAKE_DAO: "false"
        USERS_TABLE_NAME: !Ref UsersTable
        FOLLOWS_TABLE_NAME: !Ref FollowsTable
        STATUSES_TABLE_NAME: !Ref StatusesTable
        FEEDS_TABLE_NAME: !Ref FeedsTable
        SESSIONS_TABLE_NAME: !Ref SessionsTable
        PROFILE_IMAGE_BUCKET_NAME: !Ref ProfileImagesBucket

Resources:
  TweeterLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: TweeterLambdaExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:ConditionCheckItem
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !GetAtt FollowsTable.Arn
                  - !Sub "${FollowsTable.Arn}/index/*"
                  - !GetAtt StatusesTable.Arn
                  - !GetAtt FeedsTable.Arn
                  - !GetAtt SessionsTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${ProfileImagesBucket}/image/*"

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: alias
          AttributeType: S
      KeySchema:
        - AttributeName: alias
          KeyType: HASH

  FollowsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: followerAlias
          AttributeType: S
        - AttributeName: followeeAlias
          AttributeType: S
      KeySchema:
        - AttributeName: followerAlias
          KeyType: HASH
        - AttributeName: followeeAlias
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: followee-index
          KeySchema:
            - AttributeName: followeeAlias
              KeyType: HASH
            - AttributeName: followerAlias
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  StatusesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userAlias
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: userAlias
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  FeedsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userAlias
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: userAlias
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH

  ProfileImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  ProfileImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ProfileImagesBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadProfileImages
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ProfileImagesBucket}/image/*"

  TweeterDependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: TweeterDependenciesLayer
      Description: Dependencies for tweeter lambdas
      ContentUri: ./layer/
      CompatibleRuntimes:
        - nodejs20.x
        - nodejs18.x
      RetentionPolicy: Retain

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/user/login.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /login
            Method: post

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/user/register.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /register
            Method: post

  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/user/getUser.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /user/get
            Method: post

  LogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/user/logout.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /logout
            Method: post

  LoadMoreFeedItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/status/loadMoreFeedItems.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /status/feed/list
            Method: post

  LoadMoreStoryItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/status/loadMoreStoryItems.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /status/story/list
            Method: post

  PostStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/status/postStatus.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /status/post
            Method: post

  LoadMoreFolloweesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/follow/loadMoreFollowees.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /followee/list
            Method: post

  LoadMoreFollowersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/follow/loadMoreFollowers.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /follower/list
            Method: post

  GetFolloweeCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/follow/getFolloweeCount.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /followee/count
            Method: post

  GetFollowerCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/follow/getFollowerCount.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /follower/count
            Method: post

  GetIsFollowerStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/follow/getIsFollowerStatus.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /follow/status
            Method: post

  FollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/follow/follow.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /follow
            Method: post

  UnfollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda/follow/unfollow.handler
      Role: !GetAtt TweeterLambdaExecutionRole.Arn
      Layers:
        - !Ref TweeterDependenciesLayer
      Events:
        HttpApiEvent:
          Type: Api
          Properties:
            Path: /unfollow
            Method: post

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
